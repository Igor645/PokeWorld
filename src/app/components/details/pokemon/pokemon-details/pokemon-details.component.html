<app-loading-spinner message="Loading Pokémon details..." *ngIf="isLoading; else pokemonContent">
</app-loading-spinner>


<ng-template #pokemonContent>
  <!-- Navigation Buttons -->
  <div class="pokemon-nav-buttons" *ngIf="previousPokemonSpecies || nextPokemonSpecies">
    <div *ngIf="previousPokemonSpecies" class="nav-button">
      <app-pokemon-navigator [pokemon]="previousPokemonSpecies" facing="left"></app-pokemon-navigator>
    </div>
    <div *ngIf="nextPokemonSpecies" class="nav-button left">
      <app-pokemon-navigator [pokemon]="nextPokemonSpecies" facing="right"></app-pokemon-navigator>
    </div>
  </div>

  <!-- Master Game Version Selector -->
  <div class="version-bar-row">
  <div class="version-bar" [class.version-bar--loading]="!vgOptions.length">
    <mat-icon class="version-bar-icon">sports_esports</mat-icon>
    <span class="version-bar-label">Game Version</span>
    <select class="version-select" [disabled]="!vgOptions.length" (change)="onVersionChange($event)">
      <option *ngIf="!vgOptions.length" value="">—</option>
      <ng-container *ngFor="let gen of groupedVersionOptions">
        <optgroup [label]="gen.generationName">
          <option *ngFor="let v of gen.versions" [value]="v.versionId" [selected]="v.versionId === selectedVersionId">
            {{ v.label }}
          </option>
        </optgroup>
      </ng-container>
    </select>
  </div>
  </div>

  <!-- Main Content -->
  <div class="pokemon-main-view-container">
    <div class="pokemon-main-view">
      <!-- Left Side (Details) -->
      <div class="pokemon-main-view-left">
        <h1 class="pokemon-name">
          {{ vm.speciesName }}
          <div *ngIf="vm.isSpecial" class="pokemon-status-badge" [attr.data-status]="vm.status">
            {{ vm.status }}
          </div>
        </h1>

        <!-- Pokémon Types -->
        <div class="types-container">
          <app-pokemon-type *ngFor="let type of displayedTypes" [pokemonType]="type.type"
            [simpleView]="false">
          </app-pokemon-type>
        </div>

        <div class="pokemon-dex-entry">
          {{ vm.dexEntry }}
        </div>

        <ul class="general-detail-list">
          <li>
            <label class="general-detail-label">Pokédex №</label>
            <div>#{{ pokemonSpeciesDetails?.id }}</div>
          </li>

          <li>
            <label class="general-detail-label">Introduced</label>
            <div>{{ vm.generationName }}</div>
          </li>

          <li>
            <label class="general-detail-label">Height</label>
            <div>{{ vm.formattedHeight }}</div>
          </li>

          <li>
            <label class="general-detail-label">Weight</label>
            <div>{{ vm.formattedWeight }}</div>
          </li>

          <!-- Forms Dropdown -->
          <li>
            <label class="general-detail-label">Varieties</label>
            <select id="variant-select" (change)="onPokemonChange($event)" [disabled]="!vm.hasMultipleVariants">
              <option *ngFor="let v of vm.variants; trackBy: trackVariantById"
                      [value]="v.id"
                      [selected]="v.id === selectedPokemon?.id">
                {{ v.name }}
              </option>
            </select>
          </li>

          <!-- Abilities -->
          <li>
            <label class="general-detail-label">Abilities</label>
            <div class="ability-list">
              <div class="ability-container" *ngFor="let a of vm.abilities">
                <div class="ability-name">{{ a.text }}</div>
                <div class="ability-description">{{ a.flavorText }}</div>
              </div>
            </div>
          </li>

          <li>
            <label class="general-detail-label">Shape</label>
            <div>{{ vm.shapeName }}</div>
          </li>

          <li>
            <label class="general-detail-label">Color</label>
            <div>{{ vm.colorName }}</div>
          </li>

          <li>
            <label class="general-detail-label">Pokémon Cries</label>
            <div class="cry-buttons">
              <button *ngIf="vm.latestCryUrl" (click)="playCry('latest')" class="cry-button latest">
                <mat-icon>volume_up</mat-icon>
                Latest Cry
              </button>

              <button *ngIf="vm.legacyCryUrl" (click)="playCry('legacy')" class="cry-button legacy">
                <mat-icon>volume_down</mat-icon>
                Legacy Cry
              </button>
            </div>
          </li>
        </ul>
      </div>

      <!-- Right Side (Sprite & Images) -->
      <div class="pokemon-main-view-right">
        <div class="pokemon-official-sprite-container">
          <div class="float-container">
            <img #pokemonImage class="pokemon-detail-img" [src]="selectedPokemonImage" [alt]="vm.speciesName"
              (error)="selectedPokemonImage = '/images/placeholder.png'" (load)="onImageLoad()" />
          </div>
          <app-pokemon-bg-svg class="pokemonCard__bg detail"></app-pokemon-bg-svg>
        </div>

        <!-- Sprite Toggle Buttons -->
        <div class="sprite-buttons">
          <button [class.active]="!isShiny" (click)="onSpriteTypeChange(false)">
            Normal
          </button>
          <button [class.active]="isShiny" (click)="onSpriteTypeChange(true)">
            Shiny
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="pokemon-other-details">
    <app-pokemon-stats class="pokemon-stats" [pokemon]="selectedPokemon" />
    <app-pokemon-relations class="pokemon-relations" [pokemonTypes]="displayedTypes"
      [allTypes]="allTypes" />
    <app-pokemon-training class="pokemon-training" [pokemon]="selectedPokemon" [species]="pokemonSpeciesDetails" />
    <app-pokemon-breeding class="pokemon-breeding" [pokemonSpecies]="pokemonSpeciesDetails" />
    <app-pokemon-forms class="pokemon-forms" [forms]="selectedPokemon?.pokemonforms" />

    <app-pokemon-evolutions class="pokemon-evolutions" [evolutionChain]="pokemonSpeciesDetails?.evolutionchain"
      [pokemonEvolutions]="pokemonEvolutions" />

    <app-pokemon-moves class="pokemon-moves" [pokemonId]="selectedPokemon?.id" />

  </div>
</ng-template>

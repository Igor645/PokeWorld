<div class="settings-panel">

  <app-language-selector></app-language-selector>

  <div class="settings-rows">

    <div class="settings-row">
      <span class="settings-label">Dark Mode</span>
      <mat-slide-toggle [(ngModel)]="isDarkMode" (change)="toggleDarkMode()"></mat-slide-toggle>
    </div>

    <div class="settings-row">
      <span class="settings-label">Sprites</span>
      <div class="seg-ctrl">
        <button class="seg-btn" [class.active]="spriteStyle === 'sugimori'" (click)="setSpriteStyle('sugimori')">Sugimori</button>
        <button class="seg-btn" [class.active]="spriteStyle === 'home'" (click)="setSpriteStyle('home')">HOME</button>
        <button class="seg-btn" [class.active]="spriteStyle === 'pixel'" (click)="setSpriteStyle('pixel')">Pixel</button>
      </div>
    </div>

    <div class="settings-row">
      <span class="settings-label">Name Quiz Sprites</span>
      <div class="seg-ctrl">
        <button class="seg-btn" [class.active]="quizSpriteStyle === 'sugimori'" (click)="setQuizSpriteStyle('sugimori')">Sugimori</button>
        <button class="seg-btn" [class.active]="quizSpriteStyle === 'home'" (click)="setQuizSpriteStyle('home')">HOME</button>
        <button class="seg-btn" [class.active]="quizSpriteStyle === 'pixel'" (click)="setQuizSpriteStyle('pixel')">Pixel</button>
        <button class="seg-btn" [class.active]="quizSpriteStyle === 'icons'" (click)="setQuizSpriteStyle('icons')">Icons</button>
      </div>
    </div>

  </div>
</div>
